<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Calculator</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .calculator{
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        width:300px;
        text-align:center;
    }

    h2{
        margin-bottom:15px;
    }

    input{
        width:90%;
        padding:10px;
        margin:8px 0;
        font-size:18px;
    }

    button{
        width:60px;
        height:40px;
        margin:5px;
        font-size:18px;
        cursor:pointer;
        border:none;
        background:#007bff;
        color:white;
        border-radius:5px;
    }

    button:hover{
        background:#0056b3;
    }

    #result{
        margin-top:15px;
        font-size:22px;
        font-weight:bold;
        color:green;
    }
</style>
</head>
<body>

<div class="calculator">
    <h2>Maths Calculator</h2>

    <input type="number" id="num1" placeholder="Enter First Number">
    <input type="number" id="num2" placeholder="Enter Second Number">

    <div>
        <button onclick="calculate('+')">+</button>
        <button onclick="calculate('-')">−</button>
        <button onclick="calculate('*')">×</button>
        <button onclick="calculate('/')">÷</button>
    </div>

    <div id="result">Result: 0</div>
</div>

<script>
function calculate(operator){
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let result = 0;

    if(isNaN(num1) || isNaN(num2)){
        document.getElementById("result").innerHTML = "Please enter numbers";
        return;
    }

    switch(operator){
        case '+':
            result = num1 + num2;
            break;
        case '-':
            result = num1 - num2;
            break;
        case '*':
            result = num1 * num2;
            break;
        case '/':
            result = num2 !== 0 ? num1 / num2 : "Cannot divide by zero";
            break;
    }

    document.getElementById("result").innerHTML = "Result: " + result;
}
</script>

</body>
</html>
